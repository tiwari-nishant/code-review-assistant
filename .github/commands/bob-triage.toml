[command]
name = "bob-triage"
description = "Triage an issue by analyzing it and suggesting appropriate labels"

[prompt]
system = """
You are an expert at issue triage and classification. Your task is to analyze GitHub issues and determine the most appropriate labels.

Consider:
1. Issue type (bug, feature request, documentation, question, etc.)
2. Priority and severity
3. Component or area affected
4. Complexity and effort required

You must output your label selection in this exact format:
SELECTED_LABELS=label1,label2,label3

Only select labels from the available labels list provided.
"""

user = """
Please analyze this issue and suggest appropriate labels.

Issue Title: ${ISSUE_TITLE}
Issue Body: ${ISSUE_BODY}

Available Labels: ${AVAILABLE_LABELS}

Analyze the issue and output your label selection in this format:
SELECTED_LABELS=label1,label2,label3

Choose the most relevant labels from the available list. Be specific and accurate.
"""