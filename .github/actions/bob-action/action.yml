name: 'Bob Shell Action'
description: 'Run Bob Shell with specified configuration'
inputs:
  bobshell_api_key:
    description: 'Bob Shell API key'
    required: true
  bobshell_version:
    description: 'Bob Shell version to use'
    required: false
    default: 'latest'
  bobshell_debug:
    description: 'Enable debug mode'
    required: false
    default: 'false'
  max_coins:
    description: 'Maximum coins to spend'
    required: false
    default: '3'
  prompt:
    description: 'Prompt command to execute'
    required: true
  settings:
    description: 'Bob Shell settings JSON'
    required: false
    default: '{}'
  mcp:
    description: 'MCP configuration JSON'
    required: false
    default: '{}'
  hide_intermediary_output:
    description: 'Hide intermediary output'
    required: false
    default: 'false'

outputs:
  summary:
    description: 'Bob Shell output summary'
    value: ${{ steps.run_bob.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: 'Install Bob Shell'
      shell: bash
      run: |
        echo "Installing Bob Shell version ${{ inputs.bobshell_version }}..."
        
        # Install Bob Shell using npm (alternative method)
        if [ "${{ inputs.bobshell_version }}" = "latest" ]; then
          npm install -g @ibm/bob-shell
        else
          npm install -g @ibm/bob-shell@${{ inputs.bobshell_version }}
        fi
        
        # Verify installation
        bob --version || echo "Bob Shell installed but version check failed"

    - name: 'Configure Bob Shell'
      shell: bash
      env:
        BOBSHELL_API_KEY: ${{ inputs.bobshell_api_key }}
      run: |
        echo "Configuring Bob Shell..."
        bob config set api-key "$BOBSHELL_API_KEY"
        
        if [ "${{ inputs.bobshell_debug }}" = "true" ]; then
          bob config set debug true
        fi

    - name: 'Setup Bob configuration'
      shell: bash
      run: |
        echo "Setting up Bob configuration..."
        
        if [ -n "${{ inputs.settings }}" ] && [ "${{ inputs.settings }}" != "{}" ]; then
          echo '${{ inputs.settings }}' > .bob-settings.json
        fi
        
        if [ -n "${{ inputs.mcp }}" ] && [ "${{ inputs.mcp }}" != "{}" ]; then
          echo '${{ inputs.mcp }}' > .bob-mcp.json
        fi

    - name: 'Run Bob Shell'
      id: run_bob
      shell: bash
      env:
        MAX_COINS: ${{ inputs.max_coins }}
        PROMPT: ${{ inputs.prompt }}
        HIDE_OUTPUT: ${{ inputs.hide_intermediary_output }}
      run: |
        echo "Running Bob Shell with prompt: $PROMPT"
        
        BOB_CMD="bob"
        
        if [ -f ".bob-settings.json" ]; then
          BOB_CMD="$BOB_CMD --settings .bob-settings.json"
        fi
        
        if [ -f ".bob-mcp.json" ]; then
          BOB_CMD="$BOB_CMD --mcp .bob-mcp.json"
        fi
        
        if [ "$MAX_COINS" != "" ]; then
          BOB_CMD="$BOB_CMD --max-coins $MAX_COINS"
        fi
        
        OUTPUT=$($BOB_CMD "$PROMPT" 2>&1)
        EXIT_CODE=$?
        
        echo "$OUTPUT" > bob-output.txt
        
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        if [ -f "session-summary.json" ]; then
          echo "Session summary created"
        fi
        
        exit $EXIT_CODE

# Made with Bob
