name: 'Automatic PR Review'

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  auto-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '${{ vars.NODE_VERSION || ''22'' }}'

      - name: 'Log runner Node version'
        run: |
          echo "node: $(node --version 2>/dev/null || echo 'not found')"
          echo "node path: $(command -v node 2>/dev/null || echo 'not found')"

      - name: 'Download bob-action from default branch'
        run: |
          mkdir -p .github/actions/bob-action
          curl \
            --retry 3 \
            --retry-max-time 60 \
            -L -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o .github/actions/bob-action/action.yml \
            "${API_URL}/repos/${REPOSITORY}/contents/.github/actions/bob-action/action.yml?ref=${DEFAULT_BRANCH}"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN || github.token }}'
          API_URL: '${{ github.api_url }}'
          REPOSITORY: '${{ github.repository }}'
          DEFAULT_BRANCH: '${{ github.event.repository.default_branch }}'

      - name: 'Download commands from default branch'
        run: |
          mkdir -p .github/commands
          for file in bob-review.toml bob-summary.toml bob-triage.toml bob-scheduled-triage.toml; do
            curl --retry 3 --retry-max-time 60 -L -s -f \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              -o ".github/commands/${file}" \
              "${API_URL}/repos/${REPOSITORY}/contents/.github/commands/${file}?ref=${DEFAULT_BRANCH}" || true
          done
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN || github.token }}'
          API_URL: '${{ github.api_url }}'
          REPOSITORY: '${{ github.repository }}'
          DEFAULT_BRANCH: '${{ github.event.repository.default_branch }}'

      - name: 'Download and install GitHub MCP server'
        run: |
          curl \
            --retry 3 \
            --retry-max-time 60 \
            -L -s --fail \
            -o github-mcp-server.tar.gz https://github.com/github/github-mcp-server/releases/download/v0.20.1/github-mcp-server_Linux_x86_64.tar.gz
          tar -xzf github-mcp-server.tar.gz
          chmod +x ./github-mcp-server
          rm github-mcp-server.tar.gz

      - name: 'Get GitHub App token'
        id: 'app_token'
        if: vars.BOB_APP_ID != ''
        uses: 'actions/create-github-app-token@v2'
        with:
          app-id: '${{ vars.BOB_APP_ID }}'
          private-key: '${{ secrets.BOB_APP_PRIVATE_KEY }}'

      - name: 'Run automatic pull request review'
        uses: './.github/actions/bob-action'
        id: 'bobshell_pr_review'
        env:
          GITHUB_TOKEN: '${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}'
          ISSUE_TITLE: '${{ github.event.pull_request.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number }}'
          REPOSITORY: '${{ github.repository }}'
          WORKSPACE_PATH: '${{ github.workspace }}'
        with:
          max_coins: 3
          bobshell_api_key: '${{ secrets.BOBSHELL_API_KEY }}'
          bobshell_version: '${{ vars.BOBSHELL_VERSION || ''latest'' }}'
          bobshell_debug: '${{ fromJSON(vars.DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          settings: |-
            {
              "coreTools": [
                "attempt_completion"
              ]
            }
          mcp: |-
            {
              "mcpServers": {
                "github": {
                  "command": "./github-mcp-server",
                  "args": ["stdio"],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write",
                    "issue_read"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}",
                    "GITHUB_HOST": "https://github.com"
                  }
                },
                "aid": {
                  "command": "npx",
                  "args": ["-y", "@janreges/ai-distiller-mcp"],
                  "includeTools": [
                    "distill_file",
                    "distill_directory"
                  ]
                }
              }
            }
          prompt: '/bob-review'
      
      - name: 'Post review cost'
        if: hashFiles('session-summary.json') != ''
        env:
          COMMENT_TOKEN: '${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}'
          REPOSITORY: '${{ github.repository }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number }}'
          ACTOR: '${{ github.actor }}'
        run: |
          cost=$(jq -r '.sessionMetrics.sessionCost' session-summary.json)

          curl \
          --retry 3 \
          --retry-max-time 60 \
          -L -s --fail \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${COMMENT_TOKEN}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${REPOSITORY}/issues/${PULL_REQUEST_NUMBER}/comments" \
          -d "{\"body\":\"🤖 Hey @${ACTOR}, the cost of our automatic review was **${cost}** Bob coins.\"}"

# Made with Bob
