name: Automated Code Review with Bob

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Bob Shell
        run: |
          echo "Installing Bob Shell..."
          
          # Install Bob Shell following IBM documentation
          # https://internal.bob.ibm.com/docs/shell/getting-started/install-and-setup
          
          # Download and install Bob Shell
          curl -fsSL https://internal.bob.ibm.com/install.sh | bash
          
          # Add Bob to PATH
          export PATH="$HOME/.bob/bin:$PATH"
          
          # Verify installation
          if command -v bob &> /dev/null; then
            echo "✅ Bob Shell installed successfully"
            bob --version
          else
            echo "⚠️  Bob Shell installation failed"
            echo "Will use pattern-based review as fallback"
          fi

      - name: Configure Bob Shell
        env:
          BOB_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          # Configure Bob Shell if API key is available
          if [ -n "$BOB_API_KEY" ]; then
            echo "Configuring Bob Shell..."
            export PATH="$HOME/.bob/bin:$PATH"
            bob config set api-key "$BOB_API_KEY"
          else
            echo "⚠️  BOB_API_KEY not set in secrets"
            echo "Bob Shell may have limited functionality"
          fi

      - name: Run automated code review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          # Add Bob to PATH
          export PATH="$HOME/.bob/bin:$PATH"
          
          # Run the Bob CLI reviewer
          # This will:
          # 1. Fetch PR data
          # 2. Create review prompt
          # 3. Try Bob CLI (or use fallback)
          # 4. Post review to GitHub
          npm run review ${{ github.event.pull_request.number }}

      - name: Add review label
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['automated-review']
              });
            } catch (error) {
              console.log('Label might not exist, skipping...');
            }

# Made with Bob
